<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMax slice" role="img" aria-label="Arkanah tower at dusk over the Westlands skyline">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c111c"/>
      <stop offset=".45" stop-color="#1d2740"/>
      <stop offset=".78" stop-color="#5a4a52"/>
      <stop offset="1" stop-color="#c78d5c"/>
    </linearGradient>
    <linearGradient id="towerFace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#232e46"/>
      <stop offset="1" stop-color="#182136"/>
    </linearGradient>
    <linearGradient id="towerSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0c1220"/>
    </linearGradient>
    <pattern id="win" width="26" height="34" patternUnits="userSpaceOnUse">
      <rect width="26" height="34" fill="none"/>
      <rect x="4" y="6" width="14" height="18" rx="1" fill="#e9b465" opacity=".85"/>
    </pattern>
    <pattern id="winDim" width="26" height="34" patternUnits="userSpaceOnUse">
      <rect x="4" y="6" width="14" height="18" rx="1" fill="#8fa3c8" opacity=".28"/>
    </pattern>
    <pattern id="winFar" width="18" height="24" patternUnits="userSpaceOnUse">
      <rect x="3" y="4" width="9" height="12" fill="#d9a55e" opacity=".35"/>
    </pattern>
  </defs>

  <rect width="1440" height="900" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#e8ecf5">
    <circle cx="140" cy="90" r="1.4" opacity=".7"/><circle cx="320" cy="150" r="1" opacity=".5"/>
    <circle cx="520" cy="70" r="1.2" opacity=".6"/><circle cx="705" cy="180" r="1" opacity=".4"/>
    <circle cx="960" cy="60" r="1.3" opacity=".6"/><circle cx="1180" cy="130" r="1" opacity=".5"/>
    <circle cx="1330" cy="80" r="1.4" opacity=".7"/><circle cx="80" cy="230" r="1" opacity=".4"/>
    <circle cx="430" cy="240" r="1" opacity=".35"/><circle cx="1260" cy="220" r="1.1" opacity=".45"/>
  </g>
  <circle cx="1150" cy="150" r="42" fill="#f2e8d8" opacity=".9"/>
  <circle cx="1136" cy="142" r="40" fill="#1d2740" opacity=".55"/>

  <!-- far skyline -->
  <g fill="#141c2e">
    <rect x="0" y="620" width="90" height="280"/>
    <rect x="110" y="560" width="70" height="340"/>
    <rect x="200" y="640" width="120" height="260"/>
    <rect x="350" y="590" width="60" height="310"/>
    <rect x="430" y="650" width="100" height="250"/>
    <rect x="560" y="600" width="70" height="300"/>
    <rect x="1240" y="580" width="80" height="320"/>
    <rect x="1340" y="630" width="100" height="270"/>
  </g>
  <g fill="url(#winFar)">
    <rect x="110" y="560" width="70" height="300"/>
    <rect x="350" y="590" width="60" height="270"/>
    <rect x="1240" y="580" width="80" height="280"/>
  </g>

  <!-- mid tower (GTC-like) -->
  <g>
    <rect x="640" y="380" width="150" height="520" fill="#1a2438"/>
    <rect x="640" y="380" width="150" height="520" fill="url(#winDim)"/>
    <rect x="640" y="360" width="150" height="20" fill="#233049"/>
    <rect x="700" y="320" width="30" height="40" fill="#1a2438"/>
  </g>

  <!-- hero tower -->
  <g>
    <rect x="900" y="150" width="200" height="750" fill="url(#towerFace)"/>
    <rect x="1100" y="150" width="60" height="750" fill="url(#towerSide)"/>
    <polygon points="900,150 1100,150 1160,150 1160,138 900,138" fill="#2b3a58"/>
    <rect x="908" y="160" width="184" height="740" fill="url(#win)"/>
    <rect x="1108" y="160" width="44" height="740" fill="url(#winDim)"/>
    <!-- crown -->
    <rect x="960" y="104" width="80" height="34" fill="#1a2438"/>
    <rect x="992" y="76" width="16" height="28" fill="#c8a566"/>
    <circle cx="1000" cy="72" r="3.5" fill="#e9b465"/>
    <!-- rooftop pool glow -->
    <rect x="912" y="152" width="120" height="6" fill="#6fd3d8" opacity=".9"/>
  </g>

  <!-- foreground silhouettes -->
  <g fill="#0a0f1a">
    <rect x="0" y="760" width="380" height="140"/>
    <rect x="300" y="720" width="200" height="180"/>
    <path d="M480 900v-90c0-20 30-46 60-46s60 26 60 46v90z"/>
    <path d="M560 900v-120c0-26 34-54 66-54s66 28 66 54v120z"/>
    <rect x="1180" y="740" width="260" height="160"/>
    <path d="M1150 900v-70c0-16 24-38 50-38s50 22 50 38v70z"/>
  </g>
</svg>
