<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Rooftop infinity pool at dusk">
  <defs>
    <linearGradient id="psky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16203a"/>
      <stop offset=".6" stop-color="#4a4258"/>
      <stop offset="1" stop-color="#c98a5f"/>
    </linearGradient>
    <linearGradient id="pwater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#63c6d2"/>
      <stop offset="1" stop-color="#2a7e97"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#psky)"/>
  <circle cx="640" cy="120" r="34" fill="#f2e8d8" opacity=".85"/>
  <g fill="#131b2c">
    <rect x="30" y="240" width="60" height="140"/>
    <rect x="110" y="200" width="46" height="180"/>
    <rect x="180" y="260" width="70" height="120"/>
    <rect x="560" y="230" width="56" height="150"/>
    <rect x="640" y="260" width="80" height="120"/>
    <rect x="740" y="220" width="40" height="160"/>
  </g>
  <g fill="#d9a55e" opacity=".4">
