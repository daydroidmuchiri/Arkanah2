    <rect x="568" y="242" width="40" height="100"/>
  </g>
  <!-- deck -->
  <rect x="0" y="380" width="800" height="220" fill="#3a3630"/>
  <rect x="0" y="380" width="800" height="10" fill="#57504a"/>
