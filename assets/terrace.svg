<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Penthouse terrace at golden hour">
  <defs>
    <linearGradient id="tsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22304e"/>
      <stop offset=".55" stop-color="#7a5a52"/>
      <stop offset="1" stop-color="#d99a63"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#tsky)"/>
  <circle cx="560" cy="240" r="46" fill="#f4d9a8"/>
  <g fill="#1b2438" opacity=".9">
    <rect x="40" y="280" width="60" height="120"/>
    <rect x="130" y="250" width="44" height="150"/>
    <rect x="200" y="300" width="76" height="100"/>
    <rect x="640" y="270" width="60" height="130"/>
    <rect x="720" y="300" width="60" height="100"/>
  </g>
  <g fill="#d9a55e" opacity=".4">
    <rect x="136" y="262" width="32" height="110"/>
    <rect x="646" y="282" width="48" height="100"/>
  </g>
  <!-- terrace deck -->
  <rect x="0" y="400" width="800" height="200" fill="#4a3c2e"/>
  <g stroke="#5f4e3c" stroke-width="3">
    <line x1="0" y1="440" x2="800" y2="440"/>
    <line x1="0" y1="490" x2="800" y2="490"/>
    <line x1="0" y1="545" x2="800" y2="545"/>
  </g>
  <!-- glass balustrade -->
  <rect x="0" y="330" width="800" height="74" fill="#9fc4cf" opacity=".2"/>
  <rect x="0" y="326" width="800" height="6" fill="#c8a566"/>
  <g stroke="#3a332b" stroke-width="4">
    <line x1="100" y1="330" x2="100" y2="404"/>
    <line x1="300" y1="330" x2="300" y2="404"/>
    <line x1="500" y1="330" x2="500" y2="404"/>
    <line x1="700" y1="330" x2="700" y2="404"/>
  </g>
  <!-- fire pit lounge -->
  <g>
    <circle cx="400" cy="520" r="30" fill="#3a332b"/>
    <circle cx="400" cy="514" r="22" fill="#57504a"/>
    <path d="M392 512c0-8 6-10 6-16 6 4 12 10 10 18-2 6-14 8-16-2z" fill="#e9873f"/>
    <path d="M398 514c0-5 4-6 4-10 4 3 7 7 6 11-1 4-9 5-10-1z" fill="#f4c26b"/>
  </g>
  <g fill="#8a6f4e">
    <rect x="240" y="500" width="90" height="26" rx="12"/>
    <rect x="470" y="500" width="90" height="26" rx="12"/>
  </g>
  <g fill="#1d1a16">
    <rect x="252" y="526" width="8" height="16"/><rect x="310" y="526" width="8" height="16"/>
    <rect x="482" y="526" width="8" height="16"/><rect x="540" y="526" width="8" height="16"/>
  </g>
  <!-- olive tree -->
  <g>
    <circle cx="700" cy="430" r="34" fill="#54754f"/>
    <circle cx="678" cy="446" r="24" fill="#3f5a3e"/>
    <circle cx="722" cy="448" r="22" fill="#48684a"/>
    <rect x="695" y="460" width="10" height="40" fill="#5f4e3c"/>
    <path d="M676 540h48l-8-42h-32z" fill="#57504a"/>
  </g>
